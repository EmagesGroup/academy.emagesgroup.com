<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emages Academy | Acceso Estudiantes</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b1c3d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:340px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
margin-bottom:20px;
color:#0b1c3d;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#ff7a00;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e66900;
}

#mensaje{
margin-top:12px;
color:red;
font-size:14px;
}

.logo{
font-weight:bold;
margin-bottom:10px;
color:#ff7a00;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">EMAGES ACADEMY</div>

<h2>Acceso Estudiantes</h2>

<input id="usuario" placeholder="Usuario">

<input id="clave" type="password" placeholder="Clave">

<button onclick="login()">Ingresar</button>

<p id="mensaje"></p>

</div>

<script>

function login(){

let usuario=document.getElementById("usuario").value
let clave=document.getElementById("clave").value

fetch("https://script.google.com/macros/s/AKfycbwJggPmovvudEzOD6JE8PjVCvhoHHsuBJfvcf1Iyvw_1hmESAwm-0uqmF_qqetItxHvlw/exec?usuario="+usuario+"&clave="+clave)

.then(res => res.json())

.then(data => {

if(data.status=="ok"){

localStorage.setItem("usuario",usuario)
localStorage.setItem("nombre",data.nombre)
localStorage.setItem("curso",data.curso)

window.location.href="panel.html"

}else{

document.getElementById("mensaje").innerText="Usuario o contraseña incorrectos"

}

})

.catch(error => {

document.getElementById("mensaje").innerText="Error de conexión"

})

}

</script>

</body>
</html>
