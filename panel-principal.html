<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Panel del estudiante</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#0b1c3d;
color:white;
padding:15px 40px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

.curso{
background:white;
border-radius:10px;
padding:30px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.curso:hover{
transform:translateY(-5px);
}

.curso h3{
margin-top:0;
}

</style>

</head>

<body>

<header>
<h2>Panel del estudiante</h2>
</header>

<div class="container">

<h2>Mis cursos</h2>

<div class="grid" id="listaCursos"></div>

</div>

<script>

let usuario=sessionStorage.getItem("usuario")

if(!usuario){
window.location="ingresar.html"
}

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec?action=obtenerCursos&usuario="+usuario)

.then(r=>r.json())

.then(cursos=>{

let contenedor=document.getElementById("listaCursos")

cursos.forEach(curso=>{

let card=document.createElement("div")
card.className="curso"

card.innerHTML=
"<h3>"+curso.nombre+"</h3>"+
"<p>"+curso.descripcion+"</p>"

card.onclick=()=>{

window.location=curso.pagina

}

contenedor.appendChild(card)

})

})

</script>

</body>
</html>
