<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel del Estudiante | Emages Academy</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b1c3d;
color:white;
padding:15px 40px;
position:relative;
}

header button{
position:absolute;
right:40px;
top:12px;
padding:6px 10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.progreso{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.barra{
height:100%;
background:#ff7a00;
width:0%;
}

.curso-layout{
display:flex;
gap:30px;
margin-top:10px;
}

.sidebar{
width:320px;
background:#fafafa;
border-radius:10px;
padding:20px;
}

.modulo{
background:white;
border:1px solid #eee;
padding:10px;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

.video-area{
flex:1;
}

#player{
width:100%;
height:420px;
background:black;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#ff7a00;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

</style>

</head>

<body>

<header>
EMAGES ACADEMY
<button onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="container">

<div class="card">

<h2 id="bienvenida"></h2>
<p><b>Curso:</b> <span id="curso"></span></p>

<h3>Progreso del curso</h3>

<div class="progreso">
<div class="barra" id="barra"></div>
</div>

</div>

<div class="card">

<div class="curso-layout">

<div class="sidebar">

<h3>Módulos</h3>

<div class="bloque" data-bloque="1">
<h4>BLOQUE 1</h4>

<div class="modulo" data-video="hUdubWZEgYM">🔒 Video 1</div>
<div class="modulo" data-video="o_K7KXqy--s">🔒 Video 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">🔒 Video 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">🔒 Video 4</div>

</div>

<div class="bloque" data-bloque="2">
<h4>BLOQUE 2</h4>

<div class="modulo" data-video="thAF8YBFYhM">🔒 Video 1</div>
<div class="modulo" data-video="hUdubWZEgYM">🔒 Video 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">🔒 Video 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">🔒 Video 4</div>

</div>

</div>

<div class="video-area">

<div id="player"></div>

<button id="btnCompletar" disabled>
Marcar módulo como completado
</button>

</div>

</div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let nombre=sessionStorage.getItem("nombre")
let usuario=sessionStorage.getItem("usuario")
let curso="Cajero Bancario y Comercial"

if(!nombre || !usuario){
window.location="ingresar.html"
}

document.getElementById("bienvenida").innerText="Bienvenido "+nombre
document.getElementById("curso").innerText=curso

let progreso=0
let bloqueInicial=0
let bloqueFinal=0

let player
let intervalo

const TOTAL_VIDEOS=8
const bloques=document.querySelectorAll(".bloque")

function cerrarSesion(){
sessionStorage.clear()
window.location="ingresar.html"
}

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec?action=obtenerProgreso&usuario="+usuario)

.then(r=>r.json())

.then(data=>{

progreso=parseInt(data.progreso)
bloqueInicial=parseInt(data.bloque_inicial)
bloqueFinal=parseInt(data.bloque_final)

actualizarBarra()
actualizarModulos()

})

function actualizarBarra(){

let porcentaje=(progreso/TOTAL_VIDEOS)*100
document.getElementById("barra").style.width=porcentaje+"%"

}

function bloqueActivo(b){

if(bloqueInicial==0 && bloqueFinal==0) return false

if((bloqueInicial==1 || bloqueFinal==1) && b==1) return true

if((bloqueInicial==2 || bloqueFinal==2) && b==2) return true

return false

}

function actualizarModulos(){

bloques.forEach(bloque=>{

let num=parseInt(bloque.dataset.bloque)
let modulos=bloque.querySelectorAll(".modulo")

modulos.forEach(m=>{

if(bloqueActivo(num)){

m.style.opacity="1"
m.style.pointerEvents="auto"

m.innerText="▶ "+m.innerText.replace("🔒 ","")

m.onclick=()=>cargarVideo(m)

}else{

m.style.opacity="0.4"
m.style.pointerEvents="none"

if(!m.innerText.includes("🔒")){
m.innerText="🔒 "+m.innerText.replace("▶ ","")
}

}

})

})

}

function cargarVideo(elemento){

document.getElementById("btnCompletar").disabled=true

let id=elemento.dataset.video

if(player) player.destroy()

player=new YT.Player('player',{
height:'420',
width:'100%',
videoId:id,
events:{'onReady':iniciarControl}
})

}

function iniciarControl(){

if(intervalo) clearInterval(intervalo)

intervalo=setInterval(function(){

let duracion=player.getDuration()
let actual=player.getCurrentTime()

let porcentaje=(actual/duracion)*100

if(porcentaje>=80){

document.getElementById("btnCompletar").disabled=false
clearInterval(intervalo)

}

},1000)

}

</script>

</body>
</html>
