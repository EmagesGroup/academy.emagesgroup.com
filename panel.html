<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel del Estudiante</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:white;
border-right:1px solid #ddd;
overflow-y:auto;
padding:20px;
}

.bloque{
margin-bottom:25px;
}

.modulo{
padding:12px;
border-radius:6px;
margin-top:8px;
border:1px solid #eee;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.modulo:hover{
background:#f3f6ff;
}

.modulo.bloqueado{
opacity:.4;
pointer-events:none;
}

.modulo.activo{
background:#2d6cdf;
color:white;
border-color:#2d6cdf;
font-weight:bold;
}

.modulo.visto{
background:#dbe7ff;
border-color:#9bb8ff;
color:#1a3c8f;
}

.player-area{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:#0b1c3d;
color:white;
padding:15px 30px;
font-size:18px;
}

.video-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#player{
width:90%;
height:80%;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>Módulos del Curso</h3>

<div class="bloque" data-bloque="1">

<h4>BLOQUE ATENCIÓN AL CLIENTE</h4>

<div class="modulo" data-video="hUdubWZEgYM">Semana 1</div>
<div class="modulo" data-video="o_K7KXqy--s">Semana 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 4</div>

</div>

<div class="bloque" data-bloque="2">

<h4>BLOQUE OPERACIONES FINANCIERAS</h4>

<div class="modulo" data-video="thAF8YBFYhM">Semana 5</div>
<div class="modulo" data-video="hUdubWZEgYM">Semana 6</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 7</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 8</div>

</div>

</div>

<div class="player-area">

<header>EMAGES ACADEMY</header>

<div class="video-container">
<div id="player"></div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let modulos = document.querySelectorAll(".modulo")

let progreso = 0
let progresoActual = 0
let bloqueInicial = 0

let usuario = sessionStorage.getItem("usuario")

if(!usuario){
window.location="ingresar.html"
}

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec?action=obtenerProgreso&usuario="+usuario)

.then(r=>r.json())

.then(data=>{

bloqueInicial = parseInt(data.bloque_inicial) || 0
progreso = parseInt(data.progreso) || 0

controlAcceso()
marcarProgreso()

})

function controlAcceso(){

document.querySelectorAll(".bloque").forEach(bloque=>{

let num = parseInt(bloque.dataset.bloque)

bloque.querySelectorAll(".modulo").forEach(m=>{

if(bloqueInicial === 0){
bloquear(m)
}

if(bloqueInicial === 1 && num === 2){
bloquear(m)
}

if(bloqueInicial === 2 && num === 1){
bloquear(m)
}

})

})

}

function bloquear(m){

m.classList.add("bloqueado")
m.innerText="🔒 "+m.innerText

}

function marcarProgreso(){

if(progreso === 0) return

if(bloqueInicial === 1){

for(let i=0;i<progreso;i++){
modulos[i].classList.add("visto")
}

}

if(bloqueInicial === 2){

for(let i=4;i<4+progreso;i++){
modulos[i].classList.add("visto")
}

}

if(bloqueInicial === 3){

for(let i=0;i<progreso;i++){
modulos[i].classList.add("visto")
}

}

}

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'500',
width:'800',
videoId:'',
events:{
'onStateChange':estadoVideo,
'onReady': iniciarVideo
}
})

}

function iniciarVideo(){

let inicio = 0

if(bloqueInicial === 2){
inicio = 4
}

if(bloqueInicial === 3){
inicio = 0
}

inicio += progreso

if(inicio >= modulos.length){
inicio = modulos.length - 1
}

while(inicio < modulos.length && modulos[inicio].classList.contains("bloqueado")){
inicio++
}

if(inicio < modulos.length){
cargarVideo(modulos[inicio],inicio)
}

}

modulos.forEach((modulo,index)=>{

modulo.addEventListener("click",()=>{

if(modulo.classList.contains("bloqueado")) return

cargarVideo(modulo,index)

})

})

function resaltarModulo(index){

modulos.forEach(m=>m.classList.remove("activo"))

modulos[index].classList.add("activo")

}

function cargarVideo(modulo,index){

player.loadVideoById(modulo.dataset.video)

resaltarModulo(index)

progresoActual=index

}

function guardarProgreso(indice){

let progresoBloque=(indice%4)+1

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec?action=guardarProgreso&usuario="+usuario+"&progreso="+progresoBloque)

}

function estadoVideo(event){

if(event.data===YT.PlayerState.ENDED){

modulos[progresoActual].classList.remove("activo")
modulos[progresoActual].classList.add("visto")

guardarProgreso(progresoActual)

let siguiente=progresoActual+1

while(siguiente<modulos.length){

if(!modulos[siguiente].classList.contains("bloqueado")){

setTimeout(()=>{
cargarVideo(modulos[siguiente],siguiente)
},1500)

break

}

siguiente++

}

}

}

</script>

</body>
</html>
