<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel del Estudiante | Emages Academy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:white;
border-right:1px solid #ddd;
overflow-y:auto;
padding:20px;
}

.sidebar h3{
margin-top:0;
color:#0b1c3d;
}

.bloque{
margin-bottom:25px;
}

.modulo{
padding:12px;
border-radius:6px;
margin-top:8px;
border:1px solid #eee;
cursor:pointer;
font-size:14px;
}

.modulo:hover{
background:#f3f6ff;
}

.modulo.bloqueado{
opacity:0.4;
pointer-events:none;
}

.player-area{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:#0b1c3d;
color:white;
padding:15px 30px;
font-size:18px;
}

.video-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#player{
width:90%;
height:80%;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Módulos del Curso</h3>

<div class="bloque" data-bloque="1">

<h4>BLOQUE ATENCIÓN AL CLIENTE</h4>

<div class="modulo" data-video="hUdubWZEgYM">Semana 1</div>
<div class="modulo" data-video="o_K7KXqy--s">Semana 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 4</div>

</div>

<div class="bloque" data-bloque="2">

<h4>BLOQUE OPERACIONES FINANCIERAS</h4>

<div class="modulo" data-video="thAF8YBFYhM">Semana 5</div>
<div class="modulo" data-video="hUdubWZEgYM">Semana 6</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 7</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 8</div>

</div>

</div>

<div class="player-area">

<header>
EMAGES ACADEMY
</header>

<div class="video-container">
<div id="player"></div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let modulos = document.querySelectorAll(".modulo")
let progreso = 0

let usuario = sessionStorage.getItem("usuario")

let acceso = 0

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec?action=acceso&usuario="+usuario)

.then(r=>r.json())

.then(data=>{

acceso = parseInt(data.bloque_inicial)

controlAcceso()

})

function controlAcceso(){

document.querySelectorAll(".bloque").forEach(bloque=>{

let num = parseInt(bloque.dataset.bloque)

let modulosBloque = bloque.querySelectorAll(".modulo")

modulosBloque.forEach(m=>{

if(acceso === 0){

m.classList.add("bloqueado")
m.innerText="🔒 "+m.innerText

}

if(acceso === 1 && num === 2){

m.classList.add("bloqueado")
m.innerText="🔒 "+m.innerText

}

if(acceso === 2 && num === 1){

m.classList.add("bloqueado")
m.innerText="🔒 "+m.innerText

}

})

})

}

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'500',
width:'800',
videoId:'',
})

}

modulos.forEach((modulo,index)=>{

modulo.addEventListener("click",()=>{

if(modulo.classList.contains("bloqueado")) return

cargarVideo(modulo,index)

})

})

function cargarVideo(modulo,index){

let videoID = modulo.dataset.video

player.loadVideoById(videoID)

progreso = index

}

function estadoVideo(event){

if(event.data === YT.PlayerState.ENDED){

let siguiente = progreso + 1

if(siguiente < modulos.length){

let siguienteModulo = modulos[siguiente]

if(!siguienteModulo.classList.contains("bloqueado")){

setTimeout(()=>{

cargarVideo(siguienteModulo,siguiente)

},1500)

}

}

}

}

</script>

</body>
</html>
