<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel del Estudiante | Emages Academy</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b1c3d;
color:white;
padding:15px 40px;
font-size:18px;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.modulo{
border:1px solid #eee;
padding:15px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.modulo:hover{
background:#f7f7f7;
}

.video{
margin-top:20px;
}

.progreso{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.barra{
height:100%;
background:#ff7a00;
width:20%;
}

button{
margin-top:15px;
padding:12px 20px;
background:#ff7a00;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

</style>

</head>

<body>

<header>
EMAGES ACADEMY
</header>

<div class="container">

<div class="card">

<h2 id="bienvenida"></h2>

<p><b>Curso:</b> <span id="curso"></span></p>

<h3>Progreso del curso</h3>

<div class="progreso">
<div class="barra" id="barra"></div>
</div>

</div>

<div class="card">

<h3>Módulos del curso</h3>

<div class="modulo" onclick="cargarVideo('SXXVvQZpXNc')">
▶ Introducción al curso
</div>

<div class="modulo" onclick="cargarVideo('SXXVvQZpXNc')">
▶ Sistema financiero
</div>

<div class="modulo">
🔒 Operaciones bancarias (bloqueado)
</div>

<div class="video">

<div id="player"></div>

<button id="btnCompletar" onclick="completarModulo()" disabled>
Marcar módulo como completado
</button>

</div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let nombre=localStorage.getItem("nombre")
let curso=localStorage.getItem("curso")
let usuario=localStorage.getItem("usuario")

if(!nombre){
window.location="ingresar.html"
}

document.getElementById("bienvenida").innerText="Bienvenido "+nombre
document.getElementById("curso").innerText=curso

let progreso = 1

fetch("https://script.google.com/macros/s/AKfycbwJggPmovvudEzOD6JE8PjVCvhoHHsuBJfvcf1Iyvw_1hmESAwm-0uqmF_qqetItxHvlw/exec?action=obtenerProgreso&usuario="+usuario)
.then(r=>r.json())
.then(data=>{
  progreso = parseInt(data.progreso)
  actualizarBarra()
  actualizarModulos()
})

actualizarBarra()
actualizarModulos()

function actualizarBarra(){
let porcentaje = progreso*30
if(porcentaje>100){porcentaje=100}
document.getElementById("barra").style.width=porcentaje+"%"
}

function actualizarModulos(){
let modulos=document.querySelectorAll(".modulo")
modulos.forEach((m,i)=>{
  if(i < progreso){   /* <-- CAMBIO HECHO AQUÍ */
    m.style.opacity="1"
    m.style.pointerEvents="auto"
  }else{
    m.style.opacity="0.4"
    m.style.pointerEvents="none"
  }
})
}

function completarModulo(){
progreso++
localStorage.setItem("progreso",progreso)
fetch("https://script.google.com/macros/s/AKfycbwJggPmovvudEzOD6JE8PjVCvhoHHsuBJfvcf1Iyvw_1hmESAwm-0uqmF_qqetItxHvlw/exec?action=guardarProgreso&usuario="+usuario+"&progreso="+progreso)
actualizarBarra()
actualizarModulos()  // <--- Esto desbloquea automáticamente el siguiente módulo
alert("Módulo completado")
}

let player
let intervalo

function cargarVideo(id){
document.getElementById("btnCompletar").disabled=true
player = new YT.Player('player', {
height:'400',
width:'100%',
videoId:id,
events:{
'onReady':iniciarControl
}
})
}

function iniciarControl(){
intervalo=setInterval(function(){
let duracion=player.getDuration()
let actual=player.getCurrentTime()
let porcentaje=(actual/duracion)*100
if(porcentaje>=80){
document.getElementById("btnCompletar").disabled=false
clearInterval(intervalo)
}
},1000)
}

</script>

</body>
</html>
