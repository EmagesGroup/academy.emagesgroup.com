<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Curso</title>

<style>
body{
font-family:Arial;
margin:0;
display:flex;
height:100vh;
}

.sidebar{
width:300px;
background:#f4f4f4;
padding:20px;
overflow-y:auto;
}

.modulo{
padding:10px;
border:1px solid #ccc;
margin-bottom:8px;
cursor:pointer;
}

.modulo.bloqueado{
opacity:0.4;
pointer-events:none;
}

.modulo.visto{
background:#cfe2ff;
}

.modulo.activo{
background:#0d6efd;
color:white;
}

.player{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

#player{
width:80%;
height:80%;
}
</style>

</head>

<body>

<div class="sidebar">

<h3>Bloque 1</h3>

<div class="modulo" data-video="hUdubWZEgYM">Video 1</div>
<div class="modulo" data-video="o_K7KXqy--s">Video 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">Video 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Video 4</div>

<h3>Bloque 2</h3>

<div class="modulo" data-video="thAF8YBFYhM">Video 5</div>
<div class="modulo" data-video="hUdubWZEgYM">Video 6</div>
<div class="modulo" data-video="NWV_aCHRdB4">Video 7</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Video 8</div>

</div>

<div class="player">
<div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let modulos=document.querySelectorAll(".modulo")
let player

let progreso=0
let bloqueInicial=0
let progresoActual=0

let usuario=sessionStorage.getItem("usuario")

fetch("https://script.google.com/macros/s/TU_SCRIPT/exec?action=obtenerProgreso&usuario="+usuario)
.then(r=>r.json())
.then(data=>{

progreso=parseInt(data.progreso)||0
bloqueInicial=parseInt(data.bloque_inicial)||0

configurarBloques()
marcarProgreso()

})

function configurarBloques(){

modulos.forEach((m,i)=>{

if(bloqueInicial==1 && i>=4) m.classList.add("bloqueado")

if(bloqueInicial==2 && i<4) m.classList.add("bloqueado")

})

}

function marcarProgreso(){

for(let i=0;i<progreso;i++){

if(modulos[i]) modulos[i].classList.add("visto")

}

}

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{

events:{
'onStateChange':estadoVideo
}

})

}

modulos.forEach((m,i)=>{

m.addEventListener("click",()=>{

if(m.classList.contains("bloqueado")) return

player.loadVideoById(m.dataset.video)

modulos.forEach(x=>x.classList.remove("activo"))
m.classList.add("activo")

progresoActual=i

})

})

function estadoVideo(event){

if(event.data===YT.PlayerState.ENDED){

modulos[progresoActual].classList.add("visto")

fetch("https://script.google.com/macros/s/TU_SCRIPT/exec?action=guardarProgreso&usuario="+usuario+"&progreso="+(progresoActual+1))

let siguiente=progresoActual+1

if(modulos[siguiente] && !modulos[siguiente].classList.contains("bloqueado")){

setTimeout(()=>{

player.loadVideoById(modulos[siguiente].dataset.video)

modulos[siguiente].classList.add("activo")

progresoActual=siguiente

},1000)

}

}

}

</script>

</body>
</html>
