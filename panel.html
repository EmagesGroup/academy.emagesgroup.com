<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Academia</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:white;
border-right:1px solid #ddd;
overflow-y:auto;
}

.sidebar h2{
padding:20px;
margin:0;
border-bottom:1px solid #eee;
}

.bloque{
padding:10px 20px;
}

.bloque h3{
margin-top:20px;
font-size:16px;
}

.modulo{
padding:10px;
cursor:pointer;
border-radius:6px;
margin-bottom:5px;
}

.modulo:hover{
background:#f1f1f1;
}

.modulo.activo{
background:#e7f3ff;
}

.player-area{
flex:1;
display:flex;
flex-direction:column;
}

.video-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#player{
width:90%;
height:80%;
}

.controls{
padding:20px;
background:white;
border-top:1px solid #ddd;
}

#btnCompletar{
background:#ff7a00;
border:none;
color:white;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

#btnCompletar:disabled{
background:#ccc;
cursor:not-allowed;
}

.progreso{
height:8px;
background:#ddd;
margin-top:10px;
border-radius:4px;
overflow:hidden;
}

.barra{
height:100%;
background:#4caf50;
width:0%;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Curso Cajero Bancario</h2>

<div class="bloque" data-bloque="1">

<h3>Bloque Atención al Cliente</h3>

<div class="modulo" data-video="hUdubWZEgYM">Semana 1</div>
<div class="modulo" data-video="o_K7KXqy--s">Semana 2</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 3</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 4</div>

</div>

<div class="bloque" data-bloque="2">

<h3>Bloque Operaciones Financieras</h3>

<div class="modulo" data-video="thAF8YBFYhM">Semana 5</div>
<div class="modulo" data-video="hUdubWZEgYM">Semana 6</div>
<div class="modulo" data-video="NWV_aCHRdB4">Semana 7</div>
<div class="modulo" data-video="UYQ8RwQLZFw">Semana 8</div>

</div>

</div>

<div class="player-area">

<div class="video-container">
<div id="player"></div>
</div>

<div class="controls">

<button id="btnCompletar" disabled>
Marcar módulo como completado
</button>

<div class="progreso">
<div class="barra" id="barra"></div>
</div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let modulos = document.querySelectorAll(".modulo")
let progreso = 0

function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{
height:'500',
width:'800',
videoId:'hUdubWZEgYM',
events:{
'onStateChange':estadoVideo
}
})

}

modulos.forEach((modulo,index)=>{

modulo.addEventListener("click",()=>{

cargarVideo(modulo,index)

})

})

function cargarVideo(modulo,index){

modulos.forEach(m=>m.classList.remove("activo"))
modulo.classList.add("activo")

let videoID = modulo.dataset.video

player.loadVideoById(videoID)

progreso = index

}

function estadoVideo(event){

if(event.data === YT.PlayerState.ENDED){

guardarProgreso()

let siguiente = progreso + 1

if(siguiente < modulos.length){

setTimeout(()=>{

cargarVideo(modulos[siguiente],siguiente)

},1500)

}

if(progreso === 3 || progreso === 7){

document.getElementById("btnCompletar").disabled=false

}

}

}

function guardarProgreso(){

fetch("https://script.google.com/macros/s/AKfycbwvf9RFU1ko7RWxRB7gyFuJt9IwwkgNb7ICbQDPyxMZncrh5y0iG4-PCfXTYzFN92_NIg/exec",{
method:"POST",
body:JSON.stringify({
video:progreso
})
})

actualizarBarra()

}

function actualizarBarra(){

let porcentaje = ((progreso+1)/modulos.length)*100

document.getElementById("barra").style.width=porcentaje+"%"

}

document.getElementById("btnCompletar").addEventListener("click",()=>{

alert("Bloque completado, se desbloquea el siguiente")

location.reload()

})

</script>

</body>
</html>
