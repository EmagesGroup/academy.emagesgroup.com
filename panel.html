<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Virtual - Emages Academy</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#0c1f3f;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
display:flex;
gap:25px;
padding:20px;
}

.sidebar{
width:320px;
background:white;
border-radius:8px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.modulo{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.modulo:hover{
background:#f2f6ff;
}

.bloqueado{
opacity:0.4;
cursor:not-allowed;
}

.player{
flex:1;
background:white;
border-radius:8px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

#player{
width:100%;
height:400px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#0c1f3f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#888;
cursor:not-allowed;
}

</style>

</head>

<body>

<header>
<h2>EMAGES ACADEMY - CAMPUS VIRTUAL</h2>
</header>

<div class="container">

<div class="sidebar">

<h3>Contenido del curso</h3>

<div class="modulo" data-video="VIDEO_ID_1" onclick="cargarVideo(this)">
Semana 1 - Introducción
</div>

<div class="modulo bloqueado" data-video="VIDEO_ID_2" onclick="cargarVideo(this)">
Semana 2 - Atención al cliente
</div>

<div class="modulo bloqueado" data-video="VIDEO_ID_3" onclick="cargarVideo(this)">
Semana 3 - Productos financieros
</div>

<div class="modulo bloqueado" data-video="VIDEO_ID_4" onclick="cargarVideo(this)">
Semana 4 - Operaciones de caja
</div>

</div>

<div class="player">

<div id="player"></div>

<button id="btnCompletar" disabled onclick="marcarCompletado()">
Marcar módulo completado
</button>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let moduloActual
let progreso=0

/* PEGA AQUÍ TU GOOGLE SCRIPT */

const API_URL="PEGA_AQUI_TU_URL_GOOGLE_SCRIPT"

function onYouTubeIframeAPIReady(){

const primerModulo=document.querySelector(".modulo")

cargarVideo(primerModulo)

}

function cargarVideo(elemento){

if(elemento.classList.contains("bloqueado")) return

moduloActual=elemento

document.getElementById("btnCompletar").disabled=true

const id=elemento.dataset.video

if(player){

player.loadVideoById(id)
iniciarControl()

}else{

player=new YT.Player('player',{

height:'400',
width:'100%',
videoId:id,

events:{
'onReady':iniciarControl
}

})

}

}

function iniciarControl(){

setInterval(()=>{

if(player && player.getDuration){

let tiempo=player.getCurrentTime()
let total=player.getDuration()

if(total>0){

progreso=(tiempo/total)*100

if(progreso>90){

document.getElementById("btnCompletar").disabled=false

}

}

}

},2000)

}

function marcarCompletado(){

if(!moduloActual) return

const nombreModulo=moduloActual.innerText

/* GUARDA EN EXCEL */

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
alumno:"Alumno Demo",
modulo:nombreModulo
})
})

.then(res=>res.text())
.then(data=>{

const siguiente=moduloActual.nextElementSibling

if(siguiente){
siguiente.classList.remove("bloqueado")
}

document.getElementById("btnCompletar").disabled=true

alert("Progreso guardado")

})

}

</script>

</body>
</html>
